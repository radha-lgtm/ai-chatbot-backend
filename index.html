<!DOCTYPE html>
<html>
<head>
<title>AI Lead Qualification Chatbot</title>
<style>
body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chatbox{
background:white;
padding:20px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
}

#response{
margin-top:10px;
background:#eee;
padding:10px;
border-radius:5px;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="chatbox">
<h3>AI Lead Qualification</h3>

<input id="service" placeholder="Service (e.g. Website)">
<input id="industry" placeholder="Industry (e.g. Finance)">
<input id="budget" placeholder="Budget (e.g. 1L+)">
<input id="timeline" placeholder="Timeline (e.g. Urgent)">

<button onclick="sendData()">Analyze Lead</button>

<div id="response"></div>
</div>

<script>

async function sendData(){

const service = document.getElementById("service").value;
const industry = document.getElementById("industry").value;
const budget = document.getElementById("budget").value;
const timeline = document.getElementById("timeline").value;

const res = await fetch("https://ai-chatbot-backend-ykda.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
service,
industry,
budget,
timeline
})
});

const data = await res.json();

document.getElementById("response").innerText = data.reply;

}

</script>

</body>
</html>
