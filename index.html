<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot Assistant</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
}

/* Floating button */

#chatButton{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
background:#007bff;
border-radius:50%;
color:white;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* Chat window */

#chatBox{
display:none;
position:fixed;
bottom:100px;
right:25px;
width:320px;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
overflow:hidden;
}

/* Header */

#chatHeader{
background:#007bff;
color:white;
padding:12px;
font-weight:bold;
}

/* Messages */

#messages{
height:260px;
overflow-y:auto;
padding:10px;
background:#fafafa;
}

/* User message */

.user{
background:#007bff;
color:white;
padding:8px;
border-radius:8px;
margin:6px 0;
width:80%;
margin-left:auto;
}

/* Bot message */

.bot{
background:#e9ecef;
padding:8px;
border-radius:8px;
margin:6px 0;
width:80%;
}

/* Input */

#inputArea{
display:flex;
border-top:1px solid #ddd;
}

#inputArea input{
flex:1;
border:none;
padding:10px;
outline:none;
}

#inputArea button{
background:#007bff;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="chatButton" onclick="toggleChat()">💬</div>

<div id="chatBox">

<div id="chatHeader">AI Assistant</div>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

let step = 0;

let lead = {
service:"",
industry:"",
budget:"",
timeline:""
};

function toggleChat(){
const box=document.getElementById("chatBox");
box.style.display=box.style.display==="block"?"none":"block";

if(step===0){
botMessage("Hi 👋 I'm your AI assistant.");
botMessage("What service are you looking for?");
step=1;
}
}

function userMessage(text){
const messages=document.getElementById("messages");
messages.innerHTML+=`<div class="user">${text}</div>`;
messages.scrollTop=messages.scrollHeight;
}

function botMessage(text){
const messages=document.getElementById("messages");
messages.innerHTML+=`<div class="bot">${text}</div>`;
messages.scrollTop=messages.scrollHeight;
}

async function sendMessage(){

const input=document.getElementById("messageInput");
const text=input.value;

if(!text) return;

userMessage(text);
input.value="";

if(step===1){
lead.service=text;
botMessage("Great. What industry is your business in?");
step=2;
return;
}

if(step===2){
lead.industry=text;
botMessage("What is your estimated budget?");
step=3;
return;
}

if(step===3){
lead.budget=text;
botMessage("What timeline are you looking at?");
step=4;
return;
}

if(step===4){
lead.timeline=text;

botMessage("Analyzing your requirements...");

const response = await fetch("https://ai-chatbot-backend-ykda.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(lead)
});

const data=await response.json();

botMessage(data.reply);

step=0;
lead={};

}

}

document.getElementById("messageInput")
.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage();
}
});

</script>

</body>
</html>
